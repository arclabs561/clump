name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  basics:
    name: basics (fmt + clippy + check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: check
        run: cargo check --all-targets --features parallel,simd,serde,ndarray,blas

  test:
    runs-on: ubuntu-latest
    needs: basics
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: nextest
        run: cargo nextest run --features parallel,simd,serde,ndarray,blas
      - name: doc tests
        run: cargo test --doc --features parallel,simd,serde,ndarray,blas

  semver:
    name: Semver check
    runs-on: ubuntu-latest
    needs: basics
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - run: cargo semver-checks

  test-macos:
    runs-on: macos-latest
    needs: basics
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: nextest (all features incl. GPU)
        run: cargo nextest run --all-features
      - name: doc tests
        run: cargo test --doc --all-features

  feature-matrix:
    runs-on: ubuntu-latest
    needs: basics
    strategy:
      fail-fast: false
      matrix:
        feature: [parallel, simd, serde, ndarray, blas]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.feature }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: nextest --features ${{ matrix.feature }}
        run: cargo nextest run --features ${{ matrix.feature }}

  msrv:
    runs-on: ubuntu-latest
    needs: basics
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.80.0"
      - uses: Swatinem/rust-cache@v2
      - name: check (MSRV 1.80)
        run: rm -f Cargo.lock && cargo check

  bench:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: basics
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run benchmarks
        run: cargo bench --bench clustering -- --output-format bencher | tee bench-output.txt
      - name: store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench-output.txt
          alert-threshold: "120%"
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
